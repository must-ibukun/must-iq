version: "3.9"

# ============================================================
# Must-IQ — Local Infrastructure
# pgvector replaces Weaviate — vectors stored in PostgreSQL
# pgvector/pgvector:pg16 ships with vector extension built in
# ============================================================

services:

  # --------------------------------------------------------
  # PostgreSQL + pgvector extension
  # One DB for relational data AND vector similarity search
  # --------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: must_iq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mustiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mustiqsecret}
      POSTGRES_DB: ${POSTGRES_DB:-must_iq}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./libs/db/src/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mustiq} -d ${POSTGRES_DB:-must_iq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # Redis — Token quota tracking + response caching
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: must_iq_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

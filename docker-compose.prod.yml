version: "3.9"

# ============================================================
# Must-IQ — Production Stack
# Services: postgres, redis, api (NestJS), web (Next.js)
# Usage:
#   cp .env.example .env   # fill in all values
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── PostgreSQL + pgvector ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: must_iq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mustiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-must_iq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./libs/db/src/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mustiq} -d ${POSTGRES_DB:-must_iq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mustiq-net

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: must_iq_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mustiq-net

  # ── NestJS API ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: must_iq_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mustiq}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-must_iq}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT_API: 4000
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - mustiq-net

  # ── Next.js Web ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
    container_name: must_iq_web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - mustiq-net

volumes:
  postgres_data:
  redis_data:

networks:
  mustiq-net:
    driver: bridge

/**
 * Render Blueprint Specification
 * -----------------------------
 * This file allows one-click deployment of the Must-IQ Backend to Render.com.
 * It expects a Supabase connection string for the database.
 */

services:
  - type: web
    name: must-iq-api
    env: node
    plan: starter # Change to 'free' if preferred
    buildCommand: npm install && npx nx build api
    startCommand: node dist/apps/api/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard from Supabase
      - key: JWT_SECRET
        generateValue: true
      - key: CRYPTO_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false # Optional: Set if using Redis for caching
